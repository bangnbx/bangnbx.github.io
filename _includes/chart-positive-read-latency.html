<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap');

  .bench-wrap {
    --bench-bg: #0a0e17;
    --bench-card-bg: #1b1b1e;
    --bench-card-border: #1a2030;
    --bench-stat-bg: #1b1b1e;
    --bench-grid: #1a2030;
    --bench-text: #c8cdd5;
    --bench-heading: #e8ecf1;
    --bench-muted: #6b7280;
    --bench-axis: #4b5563;
    --bench-tab-bg: #141a28;
    --bench-tab-active: #1e2a3a;
    --bench-tooltip-bg: #1a2030;
    --bench-tooltip-border: #2a3040;
    --bench-dot-stroke: #0f1420;
    --bench-crosshair: rgba(255,255,255,0.1);
  }

  .bench-wrap.bench-light {
    --bench-bg: transparent;
    --bench-card-bg: #ffffff;
    --bench-card-border: #e5e7eb;
    --bench-stat-bg: #f9fafb;
    --bench-grid: #f0f0f0;
    --bench-text: #374151;
    --bench-heading: #111827;
    --bench-muted: #9ca3af;
    --bench-axis: #9ca3af;
    --bench-tab-bg: #f3f4f6;
    --bench-tab-active: #ffffff;
    --bench-tooltip-bg: #ffffff;
    --bench-tooltip-border: #e5e7eb;
    --bench-dot-stroke: #ffffff;
    --bench-crosshair: rgba(0,0,0,0.08);
  }

  .bench-wrap {
    color: var(--bench-text);
    font-family: 'DM Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 0;
  }

  .bench-wrap h2.bench-title {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--bench-heading);
    margin-bottom: 6px;
    letter-spacing: -0.5px;
    border: none;
    padding: 0;
  }

  .bench-subtitle {
    font-size: 13px;
    color: var(--bench-text);
    margin-bottom: 24px;
  }

  .bench-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 24px;
    background: var(--bench-tab-bg);
    border-radius: 8px;
    padding: 3px;
    border: 1px solid var(--bench-card-border);
  }

  .bench-tab {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    font-weight: 600;
    padding: 8px 24px;
    border-radius: 6px;
    cursor: pointer;
    color: var(--bench-muted);
    transition: all 0.2s;
    border: none;
    background: none;
  }

  .bench-tab:hover { color: var(--bench-text); }

  .bench-tab.active {
    background: var(--bench-tab-active);
    color: var(--bench-heading);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }

  .bench-chart-container {
    width: 100%;
    max-width: 960px;
    background: var(--bench-card-bg);
    border: 1px solid var(--bench-card-border);
    border-radius: 12px;
    padding: 32px 28px 20px;
    position: relative;
  }

  .bench-legend {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    justify-content: center;
    flex-wrap: wrap;
  }

  .bench-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    transition: opacity 0.3s;
    color: var(--bench-text);
  }

  .bench-legend-item.dimmed { opacity: 0.25; }
  .bench-legend-dot { width: 10px; height: 10px; border-radius: 50%; }

  .bench-canvas { width: 100%; height: 450px; }

  .bench-tooltip {
    position: absolute;
    background: var(--bench-tooltip-bg);
    border: 1px solid var(--bench-tooltip-border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 10;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    min-width: 220px;
  }

  .bench-tooltip-row { display: flex; align-items: center; gap: 8px; margin: 3px 0; }
  .bench-tooltip-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .bench-tooltip-label { color: var(--bench-muted); min-width: 120px; font-size: 10px; }
  .bench-tooltip-value { color: var(--bench-heading); font-weight: 600; }
  .bench-tooltip-header { color: var(--bench-muted); margin-bottom: 6px; font-size: 11px; }

  .bench-stats { display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }

  .bench-stat-card {
    background: var(--bench-stat-bg);
    border: 1px solid var(--bench-card-border);
    border-radius: 8px;
    padding: 12px 16px;
    text-align: center;
    min-width: 120px;
  }

  .bench-stat-label { font-size: 9px; color: var(--bench-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .bench-stat-value { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; }
  .bench-stat-unit { font-size: 11px; font-weight: 400; color: var(--bench-muted); }
  .bench-stat-detail { font-size: 10px; color: var(--bench-muted); margin-top: 3px; }

  .bench-y-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--bench-axis); text-align: center; margin-bottom: 8px; }
  .bench-x-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--bench-axis); text-align: center; margin-top: 8px; }

  .bench-tab-hint {
    font-size: 9px;
    font-weight: 400;
    opacity: 0.6;
  }

  /* .bench-legend-hint {
    font-size: 10px;
    color: var(--bench-muted);
    text-align: center;
    margin-bottom: 8px;
    opacity: 0.5;
    font-weight: 2000;
  } */
  .bench-legend-hint {
    font-size: 10px;
    color: var(--bench-text);
    text-align: center;
    margin-bottom: 8px;
    opacity: 1.0;
    font-weight: 600;
  }
</style>

<div class="bench-wrap" id="bench2Wrap">
  <div class="bench-chart-container">
    <p class="bench-legend-hint" id="bench2LegendHint">Click legend to toggle series · Dimmed = hidden</p>
    <div class="bench-legend" id="bench2Legend"></div>
    <div class="bench-y-label">Latency (ns)</div>
    <canvas class="bench-canvas" id="bench2Canvas"></canvas>
    <!-- <div class="bench-x-label">Sample Index (each ≈ 10M keys)</div> -->
    <div class="bench-tooltip" id="bench2Tooltip"></div>
  </div>

  <div class="bench-stats" id="bench2Stats"></div>
  <p style="font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--bench-muted); text-align: center; margin-top: 16px;">
    <strong>Figure 2: Positive read latency across memory limits — 10M queries on 700M keys</strong><br>
  </p>
</div>

<script src="/assets/js/chart-positive-read-latency.js"></script>
